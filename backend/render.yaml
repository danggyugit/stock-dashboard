services:
  - type: web
    name: stockdash-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DUCKDB_PATH
        value: ./data/stock_dashboard.duckdb
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
