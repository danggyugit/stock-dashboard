name: Update Stock Cache

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: true
        default: "prices_only"
        type: choice
        options:
          - prices_only           # heatmap + stocks only (~3 min)
          - fundamentals_chunked  # +full S&P 1500 fundamentals (~75 min)

  # Scheduled runs (UTC) — prices/heatmap only
  schedule:
    # 22:30 KST (US market open)        = 13:30 UTC
    - cron: "30 13 * * 1-5"
    # 02:30 KST (4 hours later, midday) = 17:30 UTC
    - cron: "30 17 * * 1-5"
    # 06:30 KST (US market close + 30m) = 21:30 UTC
    - cron: "30 21 * * 1-5"
    # 13:00 KST (Korea midday)          = 04:00 UTC
    - cron: "0 4 * * 1-5"

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    # 90 min: enough for chunked S&P 1500 fundamentals (~75 min) + slack
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml curl_cffi

      - name: Fetch cache
        run: |
          # Determine the flag based on trigger type:
          #   - workflow_dispatch with mode=fundamentals_chunked → chunked
          #   - everything else (cron, manual prices_only)       → prices/heatmap only
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.mode }}" = "fundamentals_chunked" ]; then
            EXTRA_ARGS="--fundamentals-chunked"
            echo "Mode: fundamentals_chunked (S&P 1500, ~75 min)"
          else
            EXTRA_ARGS=""
            echo "Mode: prices/heatmap only"
          fi
          cd streamlit_app
          python scripts/fetch_cache.py $EXTRA_ARGS

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streamlit_app/data/cache/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update stock cache [skip ci]"
            git push
          fi
