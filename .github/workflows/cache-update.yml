name: Update Stock Cache

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      with_fundamentals:
        description: "Also fetch fundamentals (slow, ~5min)"
        required: false
        default: "true"

  # Scheduled runs (UTC)
  # Times in KST = UTC + 9
  schedule:
    # 22:30 KST (US market open)        = 13:30 UTC
    - cron: "30 13 * * 1-5"
    # 02:30 KST (4 hours later, midday) = 17:30 UTC
    - cron: "30 17 * * 1-5"
    # 06:30 KST (US market close + 30m) = 21:30 UTC
    - cron: "30 21 * * 1-5"
    # 13:00 KST (Korea midday)          = 04:00 UTC
    - cron: "0 4 * * 1-5"

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml

      - name: Fetch cache (heatmap + stocks only — fundamentals fetched locally)
        run: |
          # NOTE: yfinance .info (quoteSummary endpoint) is blocked from
          # GitHub Actions data center IPs (returns 0/1500 tickers).
          # Fundamentals are fetched manually from a residential IP via the
          # local Windows Task Scheduler — see scripts/fetch_cache.py for
          # the --fundamentals flag.
          # This workflow only refreshes prices + market caps (heatmap).
          echo "Running prices/heatmap only (fundamentals via local cron)"
          cd streamlit_app
          python scripts/fetch_cache.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streamlit_app/data/cache/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update stock cache [skip ci]"
            git push
          fi
